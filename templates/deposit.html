{% extends "base.html" %}

{% block title %}Deposit{% endblock %}

{% block content %}
<div class="card shadow-sm border" style="max-width: 520px; margin: auto;">
  <div class="card-body p-4">
    <h1 class="h3 mb-2">Deposit Cash</h1>
    <p class="text-body-secondary mb-4">Current cash balance: ${{ cash_balance }}</p>

    <form method="post">
      <div class="mb-3">
        <label class="form-label">Amount</label>
        <input class="form-control" name="amount" placeholder="100.00" required>
      </div>

      <div class="d-flex gap-2">
        <button class="btn btn-success" type="submit">Deposit</button>
        <a class="btn btn-outline-secondary" href="{{ url_for('home') }}">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
