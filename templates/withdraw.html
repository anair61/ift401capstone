{% extends "base.html" %}

{% block title %}Withdraw{% endblock %}

{% block content %}
<div class="card shadow-sm border" style="max-width: 560px; margin: auto;">
  <div class="card-body p-4">

    <h1 class="h4 mb-2">Withdraw Cash</h1>
    <div class="text-body-secondary small mb-3">
      Current cash balance: ${{ cash_balance }}
    </div>

    <form method="post">
      <div class="mb-3">
        <label class="form-label">Amount</label>
        <input class="form-control" name="amount" placeholder="50.00" required>
      </div>

      <div class="d-flex gap-2">
        <button class="btn btn-warning" type="submit">Withdraw</button>
        <a class="btn btn-outline-secondary" href="{{ url_for('portfolio') }}">Cancel</a>
      </div>
    </form>

  </div>
</div>
{% endblock %}
