{% extends "base.html" %}

{% block title %}Cash{% endblock %}

{% block content %}
<div class="card shadow-sm border" style="max-width: 700px; margin: auto;">
  <div class="card-body p-4">
    <h1 class="h3 mb-2">Cash Management</h1>
    <p class="text-body-secondary mb-4">Current cash balance: ${{ '%.2f'|format(cash_balance) }}</p>

    <div class="row g-4">
      <div class="col-md-6">
        <div class="card border h-100">
          <div class="card-body">
            <h2 class="h5 mb-3">Deposit</h2>
            <form method="post">
              <input type="hidden" name="action" value="deposit">
              <div class="mb-3">
                <label class="form-label">Amount</label>
                <input class="form-control" name="amount" placeholder="100.00" required>
              </div>
              <button class="btn btn-success" type="submit">Deposit</button>
            </form>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card border h-100">
          <div class="card-body">
            <h2 class="h5 mb-3">Withdraw</h2>
            <form method="post">
              <input type="hidden" name="action" value="withdraw">
              <div class="mb-3">
                <label class="form-label">Amount</label>
                <input class="form-control" name="amount" placeholder="50.00" required>
              </div>
              <button class="btn btn-warning" type="submit">Withdraw</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
